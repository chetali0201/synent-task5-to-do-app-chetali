<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <h1>My Tasks</h1>
        <p class="header-sub">Stay focused, one task at a time.</p>
      </div>

      <!-- Quote - rotates on page load via JS -->
      <div class="quote-block" id="quoteBlock">
        <span class="quote-icon">"</span>
        <p id="quoteText">Loading quote...</p>
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-container">

    <!-- ADD TASK FORM -->
    <section class="add-task-section">
      <div class="input-row">
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="What do you need to do today?"
          maxlength="150"
          autocomplete="off"
        />
        <button id="addTaskBtn" class="btn btn-primary">+ Add Task</button>
      </div>

      <!-- Feedback message that shows briefly after adding a task -->
      <p class="feedback-msg" id="feedbackMsg"></p>
    </section>

    <!-- SEARCH + FILTER BAR -->
    <section class="controls-bar">
      <div class="search-wrap">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search tasks..."
          autocomplete="off"
        />
      </div>

      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
    </section>

    <!-- TASK COUNTERS -->
    <div class="counters">
      <span class="counter pending-count" id="pendingCount">0 Pending</span>
      <span class="counter-divider">·</span>
      <span class="counter completed-count" id="completedCount">0 Completed</span>
    </div>

    <!-- PENDING TASKS -->
    <section class="task-section" id="pendingSection">
      <h2 class="section-label">Pending</h2>
      <ul class="task-list" id="pendingList">
        <!-- Pending tasks injected here by JS -->
      </ul>
      <p class="empty-msg" id="pendingEmpty">No pending tasks yet — add one above!</p>
    </section>

    <!-- COMPLETED TASKS -->
    <section class="task-section" id="completedSection">
      <h2 class="section-label">Completed</h2>
      <ul class="task-list" id="completedList">
        <!-- Completed tasks injected here by JS -->
      </ul>
      <p class="empty-msg" id="completedEmpty">Great! No completed tasks here yet.</p>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>Built by <strong>Chetali Kumbhare</strong> &nbsp;·&nbsp; Web Dev Internship Project &nbsp;·&nbsp; 2026</p>
  </footer>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <p class="modal-msg">Are you sure you want to delete this task?</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirmDeleteBtn">Yes, delete</button>
        <button class="btn btn-ghost" id="cancelDeleteBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
